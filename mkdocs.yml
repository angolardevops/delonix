site_name: Delonix Engine
site_description: Motor de containers nativo do kernel, sem daemon, num único binário — em Rust.
site_url: https://angolardevops.github.io/delonix/
repo_url: https://github.com/angolardevops/delonix
repo_name: angolardevops/delonix
copyright: Delonix Engine — documentação

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: pt

nav:
  - Início: index.md
  - Começar:
      - Instalação: install.md
      - Arranque rápido: quickstart.md
      - Docker · Podman · Delonix: compare.md
  - Guias essenciais:
      - Containers: guides/containers.md
      - Imagens: guides/images.md
      - Volumes e dados: guides/volumes.md
      - Redes: guides/networks.md
      - Stacks (compose): guides/compose.md
      - Pods: guides/pods.md
  - A Consola (painel web): guides/console.md
  - Avançado:
      - Rootless: guides/rootless.md
      - Segurança: guides/security.md
      - Kubernetes (CRI): guides/kubernetes.md
      - Plataforma de IA: guides/ai-llm.md
      - Host remoto (SSH): guides/remote.md
      - Painel — arrancar & login: guides/web-ui.md
  - Conceitos:
      - Arquitectura: concepts/architecture.md
      - Protecção do host: concepts/host-protection.md
      - Modelo de segurança: concepts/security.md
  - Referência:
      - Visão geral: reference/index.md
      - Containers:
          - 'delonix run': reference/run.md
          - 'delonix ps': reference/ps.md
          - 'delonix exec': reference/exec.md
          - 'delonix ssh': reference/ssh.md
          - 'delonix logs': reference/logs.md
